name: Translation Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  translation_tests:
    runs-on: ubuntu-24.04
    name: Translation Integrity Audit

    steps:
      - name: Checkout Bagisto
        uses: actions/checkout@v5
        with:
          path: bagisto-package

      - name: Checkout UnoPim
        uses: actions/checkout@v5
        with:
          repository: unopim/unopim
          path: unopim

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Symlink Bagisto into UnoPim packages
        run: |
          mkdir -p unopim/packages/Webkul/Bagisto
          cp -r bagisto-package/src unopim/packages/Webkul/Bagisto/src
          cp bagisto-package/composer.json unopim/packages/Webkul/Bagisto/composer.json
          if [ -d bagisto-package/publishable ]; then
            cp -r bagisto-package/publishable unopim/packages/Webkul/Bagisto/publishable
          fi

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            unopim/vendor
            ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-bagisto-${{ hashFiles('unopim/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-bagisto-

      - name: Install base dependencies
        working-directory: unopim
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Register Bagisto as a path repository and require it
        working-directory: unopim
        run: |
          composer config repositories.bagisto '{"type":"path","url":"packages/Webkul/Bagisto","options":{"symlink":true}}' --json
          composer require unopim/bagisto-connector:"*@dev" --no-interaction --no-progress --prefer-dist

      - name: Prepare environment
        working-directory: unopim
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Translation Checker
        working-directory: unopim
        run: php artisan unopim:translations:check
